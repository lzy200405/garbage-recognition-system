
# Server
server.port=8080

# Application
spring.application.name=garbage-recognition-system

# MySQL Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/garbage-recognition-system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=lzy@040522
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5000

# MyBatis Plus
mybatis-plus.mapper-locations=classpath:/mapper/*.xml
mybatis-plus.type-aliases-package=edu.hubu.grs.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Logging
logging.level.com.xxx.grs.mapper=debug

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Sa-Token
sa-token.token-name=token
sa-token.timeout=3000
sa-token.activity-timeout=-1
sa-token.is-concurrent=true
sa-token.is-share=true
sa-token.token-style=uuid
sa-token.is-log=true

#Uploaded picture path
file.upload.path=uploads/

# DeepSeek API??
deepseek.api.key=
deepseek.api.base-url=https://api.deepseek.com
deepseek.model=deepseek-chat
deepseek.temperature=0.7
deepseek.max-tokens=2048




